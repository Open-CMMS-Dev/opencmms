name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  checks: write
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_OR_ANON_KEY: "ci-test-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "ci-test-service-role-key"
          SUPABASE_JWT_SECRET: "ci-test-jwt-secret"
